<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CloudNotes - Secure Notes App</title>
  <meta name="description" content="CloudNotes — a secure, beautifully designed note-taking app powered by Firebase.">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- =========================================================================
       CSS — Design tokens, light/dark mode, glassmorphism, responsive layout
       ========================================================================= -->
  <style>
    /* ---------- Design System Tokens ---------- */
    :root {
      --font: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
      --transition: all 0.3s var(--ease);
      --glass-blur: 16px;
      --radius-card: 24px;
      --radius-btn: 12px;
      --gradient-brand: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);

      /* Light mode palette */
      --bg:           #f1f5f9;
      --bg-gradient:  linear-gradient(135deg, #e0e7ff 0%, #f3e8ff 100%);
      --card:         rgba(255, 255, 255, 0.75);
      --input-bg:     #ffffff;
      --text:         #0f172a;
      --text-muted:   #475569;
      --border:       rgba(226, 232, 240, 0.8);
      --shadow:       0 20px 25px -5px rgba(0,0,0,.05), 0 10px 10px -5px rgba(0,0,0,.03);
      --primary:      #4f46e5;
      --g-btn:        #ffffff;
      --g-text:       #374151;
      --g-border:     #d1d5db;
    }

    [data-theme="dark"] {
      /* Dark mode palette */
      --bg:           #0b0f19;
      --bg-gradient:  radial-gradient(circle at top right,   rgba(99,102,241,.15), transparent 40%),
                      radial-gradient(circle at bottom left, rgba(168,85,247,.15), transparent 40%);
      --card:         rgba(17, 24, 39, 0.7);
      --input-bg:     rgba(31, 41, 55, 0.5);
      --text:         #f9fafb;
      --text-muted:   #9ca3af;
      --border:       rgba(75, 85, 99, 0.4);
      --shadow:       0 25px 50px -12px rgba(0,0,0,.5);
      --primary:      #6366f1;
      --g-btn:        #1f2937;
      --g-text:       #f9fafb;
      --g-border:     rgba(75, 85, 99, 0.4);
    }

    /* ---------- Reset ---------- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ---------- Body ---------- */
    body {
      font-family: var(--font);
      background-color: var(--bg);
      background-image: var(--bg-gradient);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      padding: 20px;
      transition: background-color .5s ease, color .5s ease;
    }

    /* ---------- Header ---------- */
    header {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 40px;
      z-index: 10;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 1.4rem;
      background: var(--gradient-brand);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Light / Dark toggle button */
    #themeToggle {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow);
      transition: var(--transition);
    }
    #themeToggle:hover { transform: scale(1.1); border-color: var(--primary); }

    /* ---------- Card ---------- */
    .card {
      background: var(--card);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 40px;
      width: 100%; max-width: 480px;
      box-shadow: var(--shadow);
      margin-top: 80px;
      transition: var(--transition);
    }

    /* ---------- Screen visibility ---------- */
    .screen { display: none; }
    .screen.active {
      display: block;
      animation: fadeUp .4s var(--ease);
    }

    /* ---------- Auth screen ---------- */
    .mock-badge {
      display: inline-block;
      background: #eab308; color: #000;
      font-size: .72rem; font-weight: 700;
      padding: 2px 10px; border-radius: 20px;
      margin-bottom: 14px;
    }

    .screen-title {
      font-size: 1.9rem; font-weight: 700;
      text-align: center; margin-bottom: 6px;
    }
    .screen-sub {
      color: var(--text-muted); font-size: .92rem;
      text-align: center; margin-bottom: 28px;
    }

    /* Form inputs */
    .form-group { position: relative; margin-bottom: 18px; }
    .form-group .icon {
      position: absolute; left: 15px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted); pointer-events: none;
    }
    .form-input {
      width: 100%;
      padding: 13px 16px 13px 44px;
      border-radius: var(--radius-btn);
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      font-family: var(--font); font-size: 1rem;
      outline: none;
      transition: var(--transition);
    }
    .form-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(99,102,241,.15);
    }

    /* Buttons */
    .btn {
      width: 100%; padding: 13px;
      border-radius: var(--radius-btn);
      font-family: var(--font); font-size: 1rem; font-weight: 600;
      cursor: pointer; border: none; outline: none;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: var(--transition);
    }
    .btn-primary {
      background: var(--gradient-brand);
      color: #fff;
    }
    .btn-primary:hover {
      opacity: .92;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(99,102,241,.35);
    }

    .divider {
      display: flex; align-items: center;
      margin: 22px 0; color: var(--text-muted); font-size: .83rem;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; border-bottom: 1px solid var(--border);
    }
    .divider::before { margin-right: 12px; }
    .divider::after  { margin-left:  12px; }

    .btn-google {
      background: var(--g-btn);
      color: var(--g-text);
      border: 1px solid var(--g-border) !important;
    }
    .btn-google:hover { transform: translateY(-1px); opacity: .88; }
    .btn-google img { width: 20px; height: 20px; }

    /* ---------- Notes screen ---------- */
    .notes-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 28px; padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .user-profile { display: flex; align-items: center; gap: 10px; }
    .user-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--gradient-brand);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700;
    }
    .user-email {
      font-size: .88rem; font-weight: 500;
      max-width: 160px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .btn-signout {
      padding: 7px 14px; font-size: .82rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text); border-radius: 8px;
      cursor: pointer;
      display: inline-flex; align-items: center; gap: 6px;
      transition: var(--transition);
    }
    .btn-signout:hover { background: #ef4444; color: #fff; border-color: #ef4444; }

    .empty-state {
      display: flex; flex-direction: column;
      align-items: center; text-align: center;
      padding: 40px 0;
    }
    .empty-icon {
      font-size: 3.5rem; margin-bottom: 18px;
      background: var(--gradient-brand);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      animation: float 3s ease-in-out infinite;
    }
    .empty-title { font-size: 1.35rem; font-weight: 600; margin-bottom: 8px; }
    .empty-body  { color: var(--text-muted); font-size: .92rem; line-height: 1.6; }

    /* ---------- Animations ---------- */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    /* ---------- Responsive ---------- */
    @media (max-width: 600px) {
      header { padding: 14px 20px; }
      .card  { padding: 28px 18px; margin-top: 64px; }
      .screen-title { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

  <!-- =========================================================================
       HEADER — logo + light/dark toggle
       ========================================================================= -->
  <header>
    <div class="logo">
      <i class="fa-solid fa-note-sticky"></i>
      <span>CloudNotes</span>
    </div>
    <button id="themeToggle" aria-label="Toggle light / dark mode">
      <i id="themeIcon" class="fa-solid fa-sun"></i>
    </button>
  </header>

  <!-- =========================================================================
       MAIN CARD
       ========================================================================= -->
  <main class="card">

    <!-- AUTH SCREEN — shown when user is signed out -->
    <section id="authScreen" class="screen active">
      <div style="display:flex;justify-content:center;">
        <span class="mock-badge" id="mockBadge">⚡ Mock / Preview Mode</span>
      </div>
      <h1 class="screen-title">Welcome Back</h1>
      <p class="screen-sub">Sign in to access your notes securely</p>

      <form id="loginForm">
        <div class="form-group">
          <i class="fa-solid fa-envelope icon"></i>
          <input id="emailInput" type="email" class="form-input" placeholder="Email address" required>
        </div>
        <div class="form-group">
          <i class="fa-solid fa-lock icon"></i>
          <input id="passwordInput" type="password" class="form-input" placeholder="Password" required>
        </div>
        <button type="submit" class="btn btn-primary">
          <i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In
        </button>
      </form>

      <div class="divider">or</div>

      <button id="signInGoogleBtn" class="btn btn-google">
        <!-- Official Google "G" logo (stable public URL) -->
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google logo">
        Sign in with Google
      </button>
    </section>

    <!-- NOTES SCREEN — shown when user is signed in -->
    <section id="notesScreen" class="screen">
      <div class="notes-header">
        <div class="user-profile">
          <div class="user-avatar" id="userAvatar">U</div>
          <span class="user-email" id="userEmailDisplay">user@example.com</span>
        </div>
        <button id="signOutBtn" class="btn-signout">
          <i class="fa-solid fa-arrow-right-from-bracket"></i> Sign Out
        </button>
      </div>

      <!-- Note composer -->
      <form id="noteForm">
        <div class="form-group">
          <i class="fa-solid fa-pen icon"></i>
          <input id="noteInput" type="text" class="form-input" placeholder="Write a note…" required>
        </div>
        <button type="submit" class="btn btn-primary">
          <i class="fa-solid fa-plus"></i> Add Note
        </button>
      </form>

      <!-- Empty state placeholder (notes list goes here later) -->
      <div class="empty-state">
        <i class="fa-regular fa-clipboard empty-icon"></i>
        <p class="empty-title">My Notes</p>
        <p class="empty-body">Your cabinet is empty.<br>Start capturing your thoughts!</p>
      </div>
    </section>

  </main>

  <!-- =========================================================================
       SCRIPT — Firebase ESM imports MUST be top-level in a module script.
       Conditionally initialise Firebase or fall back to mock mode.
       ========================================================================= -->
  <script type="module">
    /* Firebase SDK — loaded from Google CDN, no build step needed */
    import { initializeApp }        from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import {
      getAuth, onAuthStateChanged,
      signInWithEmailAndPassword,
      signInWithPopup, GoogleAuthProvider,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import {
      getFirestore, collection, addDoc, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    /* -------------------------------------------------------------------------
       TODO: Replace placeholder values with your project's Firebase config.
             Find it at: Firebase Console → Project Settings → Your apps
       ------------------------------------------------------------------------- */
const firebaseConfig = {
  apiKey: "AIzaSyB-j7NngXoJk5IlFBfXm9okPDJYBHAoF8s",
  authDomain: "iskl-new.firebaseapp.com",
  projectId: "iskl-new",
  storageBucket: "iskl-new.firebasestorage.app",
  messagingSenderId: "7658659126",
  appId: "1:7658659126:web:a109c047cf09920b9fe797"
};

    /* Auto-detect mock mode: true until a real API key is pasted in */
    const isMockMode = firebaseConfig.apiKey === "YOUR_API_KEY_HERE";

    /* --- DOM refs --- */
    const $authScreen  = document.getElementById('authScreen');
    const $notesScreen = document.getElementById('notesScreen');
    const $mockBadge   = document.getElementById('mockBadge');
    const $avatar      = document.getElementById('userAvatar');
    const $email       = document.getElementById('userEmailDisplay');
    const $toggle      = document.getElementById('themeToggle');
    const $icon        = document.getElementById('themeIcon');

    if (!isMockMode) $mockBadge.style.display = 'none';

    /* -------------------------------------------------------------------------
       Screen switching
       ------------------------------------------------------------------------- */
    function showApp(user) {
      $authScreen .classList.remove('active');
      $notesScreen.classList.add('active');
      $email.textContent  = user.email || 'Anonymous';
      $avatar.textContent = user.email ? user.email[0].toUpperCase() : 'U';
    }
    function showAuth() {
      $notesScreen.classList.remove('active');
      $authScreen .classList.add('active');
    }

    /* -------------------------------------------------------------------------
       Light / Dark theme toggle
       — persists preference in localStorage
       ------------------------------------------------------------------------- */
    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      $icon.className = theme === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
      localStorage.setItem('theme', theme);
    }

    applyTheme(localStorage.getItem('theme') || 'dark');

    $toggle.addEventListener('click', () => {
      const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      applyTheme(next);
    });

    /* -------------------------------------------------------------------------
       Auth wiring — real Firebase or mock mode
       ------------------------------------------------------------------------- */
    if (!isMockMode) {
      /* ---- Real Firebase ---- */
      const app      = initializeApp(firebaseConfig);
      const auth     = getAuth(app);
      const db       = getFirestore(app);
      const gProvider = new GoogleAuthProvider();

      let currentUser = null;

      /* React to auth state (handles page reload, session persistence, etc.) */
      onAuthStateChanged(auth, user => {
        currentUser = user;
        user ? showApp(user) : showAuth();
      });

      /* Save a note to Firestore */
      document.getElementById('noteForm').addEventListener('submit', async e => {
        e.preventDefault();
        const $note = document.getElementById('noteInput');
        const text  = $note.value.trim();
        if (!text || !currentUser) return;
        try {
          await addDoc(collection(db, 'notes'), {
            text,
            author: { uid: currentUser.uid, email: currentUser.email },
            createdAt: serverTimestamp()
          });
          $note.value = '';
        } catch (err) {
          console.error("Save note error:", err);
          alert(err.message);
        }
      });

      /* Email / password sign-in */
      document.getElementById('loginForm').addEventListener('submit', async e => {
        e.preventDefault();
        const email    = document.getElementById('emailInput').value;
        const password = document.getElementById('passwordInput').value;
        try {
          await signInWithEmailAndPassword(auth, email, password);
        } catch (err) {
          console.error("Email sign-in error:", err);
          alert(err.message);
        }
      });

      /* Google sign-in */
      document.getElementById('signInGoogleBtn').addEventListener('click', async () => {
        try {
          await signInWithPopup(auth, gProvider);
        } catch (err) {
          console.error("Google sign-in error:", err);
          alert(err.message);
        }
      });

      /* Sign out */
      document.getElementById('signOutBtn').addEventListener('click', () =>
        signOut(auth).catch(err => console.error("Sign-out error:", err))
      );

    } else {
      /* ---- Mock mode — test UI without a Firebase project ---- */
      console.info("CloudNotes: running in mock mode. Paste your Firebase config to go live.");

      document.getElementById('loginForm').addEventListener('submit', e => {
        e.preventDefault();
        showApp({ email: document.getElementById('emailInput').value });
      });

      document.getElementById('signInGoogleBtn').addEventListener('click', () => {
        showApp({ email: "google.user@example.com" });
      });

      document.getElementById('signOutBtn').addEventListener('click', showAuth);
    }
  </script>

</body>
</html>
